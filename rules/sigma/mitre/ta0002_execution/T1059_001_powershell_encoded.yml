title: Suspicious PowerShell Encoded Command Execution
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: |
  Detects execution of PowerShell with Base64-encoded commands, a common
  technique used by attackers to obfuscate malicious commands and bypass
  basic string-based detection. Sub-technique T1059.001.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://www.elastic.co/guide/en/siem/guide/current/suspicious-powershell-script.html
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/03
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  powershell_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\powershell_ise.exe'
  encoded_param:
    CommandLine|contains|any:
      - ' -EncodedCommand '
      - ' -Enc '
      - ' -En '
      - ' -ec '
  hidden:
    CommandLine|contains|any:
      - ' -WindowStyle Hidden'
      - ' -W Hidden'
      - ' -NonInteractive'
      - ' -NoProfile'
  condition: powershell_process and encoded_param
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Software deployment tools (SCCM, Chef, Puppet)
level: high
fields:
  - CommandLine
  - ParentImage
  - User
  - EventID
custom:
  mitre_tactic: "TA0002 – Execution"
  mitre_technique: "T1059.001 – PowerShell"
  windows_event_id: "4688"
