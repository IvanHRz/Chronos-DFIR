title: Ingress Tool Transfer – Living-off-the-Land Downloaders
id: d4e5f6a7-b8c9-0123-defa-234567890124
status: stable
description: |
  Detects attacker use of native Windows tools (LOLBins) to download
  malicious payloads from external infrastructure. Certutil, BITSAdmin,
  PowerShell Invoke-WebRequest, curl, wget, and mshta are commonly abused
  for staging second-stage malware after initial access.
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/
  - https://github.com/WithSecureLabs/chainsaw
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/07
tags:
  - attack.command_and_control
  - attack.t1105
  - lolbas
  - chainsaw
logsource:
  category: process_creation
  product: windows
detection:
  certutil_download:
    Image|endswith: '\certutil.exe'
    CommandLine|contains|any:
      - '-urlcache'
      - '-verifyctl'
      - '-decode'
      - '-decodehex'
  bitsadmin_download:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains|any:
      - '/transfer'
      - '/addfile'
      - '/download'
  powershell_download:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'Invoke-WebRequest'
      - 'iwr '
      - 'wget '
      - 'curl '
      - 'DownloadFile'
      - 'DownloadString'
      - 'Net.WebClient'
      - 'Start-BitsTransfer'
  mshta_remote:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http'
  wscript_remote:
    Image|endswith|any:
      - '\wscript.exe'
      - '\cscript.exe'
    CommandLine|contains:
      - 'http'
  regsvr32_remote:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - 'http'
  condition: certutil_download or bitsadmin_download or powershell_download or mshta_remote or wscript_remote or regsvr32_remote
falsepositives:
  - Legitimate software deployment (SCCM, Intune) using certutil or bitsadmin
  - Windows Update leveraging BITSAdmin
  - Authorized developer scripts downloading packages
level: high
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
  - ParentCommandLine
custom:
  mitre_tactic: "TA0011 – Command and Control / TA0002 – Execution"
  mitre_technique: "T1105 – Ingress Tool Transfer"
  windows_event_ids: ["4688", "1"]
  chainsaw_compatible: true
  lolbas: ["certutil.exe", "bitsadmin.exe", "mshta.exe", "regsvr32.exe"]
