title: System Owner / User Discovery – Whoami and User Enumeration Commands
id: d4e5f6a7-b2c3-4890-ade0-f12345678901
status: stable
description: |
  Detects execution of commands used to discover the current user context and enumerate
  local/remote user sessions. Adversaries run whoami, query user, qwinsta, and net user
  immediately after gaining initial access to understand their privilege level and plan
  lateral movement or privilege escalation.
references:
  - https://attack.mitre.org/techniques/T1033/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.discovery
  - attack.t1033
logsource:
  category: process_creation
  product: windows
detection:
  whoami_exec:
    Image|endswith: '\whoami.exe'
  whoami_cmdline:
    CommandLine|contains|any:
      - 'whoami /priv'
      - 'whoami /groups'
      - 'whoami /all'
      - 'whoami /user'
  query_user:
    Image|endswith|any:
      - '\query.exe'
      - '\quser.exe'
    CommandLine|contains|any:
      - 'query user'
      - 'query session'
  qwinsta_exec:
    Image|endswith: '\qwinsta.exe'
  qprocess_exec:
    Image|endswith: '\qprocess.exe'
  net_user_enum:
    Image|endswith|any:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains|any:
      - 'net user'
      - 'net localgroup'
      - 'net group'
  process_creation_evtid:
    EventID|is_in:
      - '4688'
      - '1'
  condition: (whoami_exec or whoami_cmdline or query_user or qwinsta_exec or qprocess_exec or net_user_enum) and process_creation_evtid
falsepositives:
  - System administrators running whoami during troubleshooting
  - Login scripts that enumerate user groups for policy application
  - Monitoring tools that periodically check user sessions
level: low
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - EventID
custom:
  mitre_tactic: "TA0007 – Discovery"
  mitre_technique: "T1033 – System Owner/User Discovery"
  windows_event_ids: ["4688", "1"]
  investigation_note: |
    This is typically one of the first commands executed post-compromise.
    Look for rapid succession of discovery commands (T1033 + T1082 + T1049) within minutes.
    If whoami is spawned by unusual parents (e.g., w3wp.exe, java.exe), escalate immediately.
    Correlate with logon events (4624) to identify the session origin.
