title: System Network Connections Discovery – Active Connection Enumeration
id: d6e7f8a9-b4c5-4012-6902-134567890123
status: stable
description: |
  Detects enumeration of active network connections and listening ports. Adversaries use
  netstat, Get-NetTCPConnection, ss, and nmap to map network topology, identify services,
  and discover potential lateral movement targets. This reconnaissance is typically performed
  early in the intrusion to understand the network environment.
references:
  - https://attack.mitre.org/techniques/T1049/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.discovery
  - attack.t1049
logsource:
  category: process_creation
  product: windows
detection:
  netstat_enum:
    Image|endswith: '\netstat.exe'
    CommandLine|contains|any:
      - '-ano'
      - '-an'
      - '-ab'
      - '-anob'
      - '-naob'
      - '-bno'
  get_nettcp:
    CommandLine|contains|any:
      - 'Get-NetTCPConnection'
      - 'Get-NetUDPEndpoint'
      - 'Get-NetNeighbor'
  ss_enum:
    CommandLine|contains|any:
      - 'ss -tulpn'
      - 'ss -antp'
      - 'ss -lntp'
  nmap_internal:
    Image|endswith|any:
      - '\nmap.exe'
      - '\nmap'
    CommandLine|contains|any:
      - '10.'
      - '172.16.'
      - '172.17.'
      - '172.18.'
      - '192.168.'
      - '-sn'
      - '-sT'
      - '-sS'
      - '-sV'
      - '-p-'
  arp_enum:
    Image|endswith: '\arp.exe'
    CommandLine|contains: '-a'
  route_print:
    Image|endswith: '\route.exe'
    CommandLine|contains: 'print'
  ipconfig_all:
    Image|endswith: '\ipconfig.exe'
    CommandLine|contains: '/all'
  powershell_network_scan:
    CommandLine|contains|any:
      - 'Test-NetConnection'
      - 'Test-Connection -Count'
      - 'TcpClient('
      - 'Net.Sockets.TcpClient'
      - '1..254 | ForEach'
      - 'ping -n 1'
  condition: netstat_enum or get_nettcp or ss_enum or nmap_internal or arp_enum or route_print or ipconfig_all or powershell_network_scan
falsepositives:
  - Network administrators troubleshooting connectivity
  - Monitoring scripts checking service availability
  - Security scanners performing authorized vulnerability assessments
level: low
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - EventID
custom:
  mitre_tactic: "TA0007 – Discovery"
  mitre_technique: "T1049 – System Network Connections Discovery"
  windows_event_ids: ["4688", "1"]
  investigation_note: |
    Network enumeration is often the precursor to lateral movement (T1021).
    nmap scanning internal RFC1918 ranges from a workstation is a strong red flag.
    Look for rapid succession of netstat + arp + route = systematic reconnaissance.
    PowerShell port scanning (TcpClient loops) indicates hands-on-keyboard activity.
    Correlate the discovered hosts with subsequent lateral movement attempts.
