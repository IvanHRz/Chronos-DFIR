title: Process Discovery – Enumeration of Running Processes
id: f6a7b8c9-d4e5-4012-cf02-134567890123
status: stable
description: |
  Detects execution of process listing commands used by adversaries to enumerate running
  processes, identify security tools (AV/EDR), and locate target applications. This is a
  standard reconnaissance step performed after initial access to understand the endpoint
  security posture and identify processes for injection or tampering.
references:
  - https://attack.mitre.org/techniques/T1057/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.discovery
  - attack.t1057
logsource:
  category: process_creation
  product: windows
detection:
  tasklist_exec:
    Image|endswith: '\tasklist.exe'
  tasklist_verbose:
    CommandLine|contains|any:
      - 'tasklist /v'
      - 'tasklist /svc'
      - 'tasklist /fi'
      - 'tasklist /m'
  get_process_ps:
    CommandLine|contains|any:
      - 'Get-Process'
      - 'gps '
      - 'get-process'
  wmic_process:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|any:
      - 'process list'
      - 'process get'
      - 'process where'
  query_process:
    Image|endswith|any:
      - '\qprocess.exe'
      - '\query.exe'
    CommandLine|contains: 'process'
  condition: tasklist_exec or tasklist_verbose or get_process_ps or wmic_process or query_process
falsepositives:
  - System administrators listing processes for troubleshooting
  - Monitoring scripts checking service health
  - Help desk tools collecting diagnostic information
level: low
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - EventID
custom:
  mitre_tactic: "TA0007 – Discovery"
  mitre_technique: "T1057 – Process Discovery"
  windows_event_ids: ["4688", "1"]
  investigation_note: |
    Adversaries enumerate processes to find AV/EDR (MsMpEng.exe, CrowdStrike, SentinelOne).
    Look for tasklist piped to findstr targeting security product names.
    If followed by service stop commands (net stop, sc stop), escalate to defense evasion.
    Correlate parent process: cmd.exe spawned by unusual binaries is a red flag.
