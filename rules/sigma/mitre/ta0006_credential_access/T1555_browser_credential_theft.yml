title: Browser Credential Store Access and Theft
id: f6a7b8c9-d0e1-2345-fabc-345678901234
status: stable
description: |
  Detects access to browser credential stores (Chrome, Firefox, Edge, Brave).
  Attackers target browser password databases (Login Data, logins.json),
  cookies, and encryption keys to harvest saved credentials. Tools like
  LaZagne, SharpChromium, and HackBrowserData automate extraction of
  passwords, cookies, and autofill data from all installed browsers.
references:
  - https://attack.mitre.org/techniques/T1555/
  - https://attack.mitre.org/techniques/T1555/003/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.credential_access
  - attack.t1555
  - attack.t1555.003
  - browser
logsource:
  category: process_creation
  product: windows
detection:
  chrome_credential_access:
    CommandLine|contains|any:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Cookies'
      - '\Google\Chrome\User Data\Local State'
      - 'Chrome\User Data\Default\Web Data'
  firefox_credential_access:
    CommandLine|contains|any:
      - '\Mozilla\Firefox\Profiles\'
      - 'logins.json'
      - 'key3.db'
      - 'key4.db'
      - 'cert9.db'
  edge_credential_access:
    CommandLine|contains|any:
      - '\Microsoft\Edge\User Data\Default\Login Data'
      - '\Microsoft\Edge\User Data\Default\Cookies'
      - '\Microsoft\Edge\User Data\Local State'
  browser_theft_tools:
    CommandLine|contains|any:
      - 'lazagne'
      - 'SharpChromium'
      - 'HackBrowserData'
      - 'BrowserGather'
      - 'ChromePass'
      - 'WebBrowserPassView'
      - 'mimikatz'
      - 'dpapi::chrome'
  dpapi_masterkey:
    CommandLine|contains|any:
      - 'dpapi::masterkey'
      - 'sekurlsa::dpapi'
      - 'CryptUnprotectData'
      - 'vaultcmd'
  condition: chrome_credential_access or firefox_credential_access or edge_credential_access or browser_theft_tools or dpapi_masterkey
falsepositives:
  - Browser synchronization services
  - Password managers importing browser credentials
  - Authorized security audits of saved credentials
level: high
fields:
  - Image
  - CommandLine
  - User
  - Computer
  - ParentImage
custom:
  mitre_tactic: "TA0006 – Credential Access"
  mitre_technique: "T1555 – Credentials from Password Stores"
  chainsaw_compatible: true
  investigation_note: |
    Browser credential theft often precedes lateral movement as attackers
    harvest saved passwords for internal services. Check for file copy
    operations targeting browser profile directories. Correlate with
    DPAPI master key access (needed to decrypt Chrome passwords).
