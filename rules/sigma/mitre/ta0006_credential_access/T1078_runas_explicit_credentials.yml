title: RunAs Explicit Credential Usage – Event 4648
id: a3b4c5d6-1313-4a7b-b8c9-d0e1f2a3b4c5
status: stable
description: |
  Detects Windows Event 4648 (logon using explicit credentials / RunAs) which indicates
  a user authenticating as a different account. This is a key indicator of credential
  misuse, privilege escalation attempts, and lateral movement preparation. Attackers
  use RunAs, net use, or PsExec with harvested credentials to escalate or pivot.
  Filters out normal service account activity to reduce noise.
references:
  - https://attack.mitre.org/techniques/T1078/
  - https://attack.mitre.org/techniques/T1021/
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4648
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.privilege_escalation
  - attack.t1078
  - attack.lateral_movement
  - attack.t1021
  - chainsaw
logsource:
  product: windows
  service: security
detection:
  runas_event:
    EventID: '4648'
  suspicious_target_process:
    ProcessName|contains|any:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'pwsh.exe'
      - 'mmc.exe'
      - 'mstsc.exe'
      - 'psexec'
      - 'wmic.exe'
      - 'net.exe'
      - 'runas.exe'
  admin_target_account:
    TargetUserName|contains|any:
      - 'admin'
      - 'Administrator'
      - 'svc_'
      - 'service'
      - 'DA-'
      - 'SA-'
  remote_target:
    TargetServerName|not: 'localhost'
    TargetServerName|not: ''
  condition: runas_event and (suspicious_target_process or admin_target_account or remote_target)
falsepositives:
  - Administrators using RunAs for legitimate elevated tasks
  - Service accounts authenticating to remote systems
  - Scheduled tasks running under different credentials
level: high
fields:
  - EventID
  - SubjectUserName
  - SubjectDomainName
  - TargetUserName
  - TargetDomainName
  - TargetServerName
  - ProcessName
  - IpAddress
  - IpPort
custom:
  mitre_tactic: "TA0004 – Privilege Escalation"
  mitre_technique: "T1078 – Valid Accounts"
  windows_event_ids: ["4648"]
  chainsaw_compatible: true
  investigation_note: |
    Event 4648 shows WHO used WHOSE credentials to access WHAT. SubjectUserName is
    the actual user, TargetUserName is the impersonated account. Look for patterns
    where a standard user account uses Domain Admin credentials. Correlate with
    4624 Type 3/10 events on the TargetServerName to confirm successful access.
