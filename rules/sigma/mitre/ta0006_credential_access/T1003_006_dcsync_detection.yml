title: DCSync Attack – Directory Replication Request
id: b2c3d4e5-f6a7-8901-bcde-f01234567890
status: stable
description: |
  Detects DCSync attacks where an attacker uses Directory Replication Service
  (DRS) to request password hashes from a Domain Controller. This is a critical
  credential theft technique that requires Domain Admin or replication privileges.
  Tools like Mimikatz (lsadump::dcsync) and Impacket (secretsdump.py) abuse
  the MS-DRSR protocol to extract NTLM hashes, Kerberos keys, and password
  history for any domain account including KRBTGT.
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://adsecurity.org/?p=1729
  - https://docs.microsoft.com/en-us/openspecs/windows_protocols/ms-drsr/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.credential_access
  - attack.t1003.006
  - active_directory
  - critical
logsource:
  category: process_creation
  product: windows
detection:
  dcsync_replication_event:
    EventID: '4662'
    Properties|contains|any:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
      - '89e95b76-444d-4c62-991a-0facbeda640c'
  dcsync_replication_rights:
    EventID: '4662'
    AccessMask: '0x100'
  mimikatz_dcsync:
    CommandLine|contains|any:
      - 'lsadump::dcsync'
      - 'lsadump::netsync'
      - '/user:krbtgt'
      - 'secretsdump'
      - 'Get-ADReplAccount'
  replication_non_dc:
    EventID: '4624'
    LogonType: '3'
    CommandLine|contains|any:
      - 'DsGetNCChanges'
      - 'DSReplicaGetInfo'
      - 'DRSUAPI'
  condition: dcsync_replication_event or dcsync_replication_rights or mimikatz_dcsync or replication_non_dc
falsepositives:
  - Legitimate Domain Controller replication (DC-to-DC)
  - Azure AD Connect synchronization
  - Authorized AD backup tools using replication APIs
level: critical
fields:
  - SubjectUserName
  - SubjectDomainName
  - ObjectName
  - Properties
  - AccessMask
  - IpAddress
  - Computer
custom:
  mitre_tactic: "TA0006 – Credential Access"
  mitre_technique: "T1003.006 – OS Credential Dumping: DCSync"
  windows_event_ids: ["4662", "4624"]
  chainsaw_compatible: true
  investigation_note: |
    DCSync from a non-DC source is always malicious. Check the source IP —
    if it's not a Domain Controller, this is a confirmed attack. Review
    Event 4662 for the specific GUIDs that indicate replication requests.
    The KRBTGT account hash enables Golden Ticket attacks.
