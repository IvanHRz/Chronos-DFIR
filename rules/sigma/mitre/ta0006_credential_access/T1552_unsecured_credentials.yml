title: Unsecured Credentials – Credential Hunting in Files and Registry
id: c5d6e7f8-a3b4-4901-5891-023456789012
status: stable
description: |
  Detects credential hunting activity where adversaries search for passwords and sensitive
  credentials stored in files, registry, and configuration data. Covers findstr/Select-String
  searching for passwords, enumeration of RDP/VNC files, registry queries for cached
  credentials, and mimikatz DPAPI module execution.
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1552/001/
  - https://attack.mitre.org/techniques/T1552/002/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.credential_access
  - attack.t1552
  - attack.t1552.001
  - attack.t1552.002
logsource:
  category: process_creation
  product: windows
detection:
  findstr_password:
    Image|endswith: '\findstr.exe'
    CommandLine|contains|any:
      - '/si password'
      - '/si passwd'
      - '/si credential'
      - '/si secret'
      - '/si apikey'
      - '/si api_key'
      - '/si token'
  dir_sensitive_files:
    CommandLine|contains|any:
      - 'dir /s *.rdp'
      - 'dir /s *.vnc'
      - 'dir /s *.config'
      - 'dir /s *.ini'
      - 'dir /s *.kdbx'
      - 'dir /s *.key'
      - 'dir /s *.pem'
      - 'dir /s *.pfx'
      - 'dir /s *.p12'
      - 'dir /s web.config'
      - 'dir /s unattend.xml'
      - 'dir /s *.cred'
  reg_saved_passwords:
    Image|endswith: '\reg.exe'
    CommandLine|contains|any:
      - 'query HKLM /f password /t REG_SZ /s'
      - 'query HKCU /f password /t REG_SZ /s'
      - 'query "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"'
      - 'query "HKCU\Software\SimonTatham\PuTTY\Sessions"'
      - 'query "HKLM\SYSTEM\CurrentControlSet\Services\SNMP"'
      - 'save HKLM\SAM'
      - 'save HKLM\SYSTEM'
      - 'save HKLM\SECURITY'
  powershell_cred_search:
    CommandLine|contains|any:
      - 'Select-String -Pattern password'
      - 'Select-String -Pattern passwd'
      - 'Get-ChildItem -Recurse *.config'
      - 'Get-Content *unattend*'
      - 'ConvertFrom-SecureString'
      - 'Get-VaultCredential'
      - 'Get-StoredCredential'
  mimikatz_dpapi:
    CommandLine|contains|any:
      - 'dpapi::masterkey'
      - 'dpapi::cred'
      - 'dpapi::vault'
      - 'dpapi::chrome'
      - 'sekurlsa::dpapi'
  cmdkey_list:
    Image|endswith: '\cmdkey.exe'
    CommandLine|contains: '/list'
  vaultcmd_list:
    Image|endswith: '\vaultcmd.exe'
    CommandLine|contains: '/list'
  condition: findstr_password or dir_sensitive_files or reg_saved_passwords or powershell_cred_search or mimikatz_dpapi or cmdkey_list or vaultcmd_list
falsepositives:
  - Security auditors running credential exposure assessments
  - IT administrators checking for saved credentials during hardening
  - Compliance tools scanning for exposed secrets
level: medium
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - EventID
custom:
  mitre_tactic: "TA0006 – Credential Access"
  mitre_technique: "T1552 – Unsecured Credentials"
  windows_event_ids: ["4688", "1"]
  investigation_note: |
    findstr /si password is the most common credential hunting command in the wild.
    reg save SAM/SYSTEM/SECURITY = offline credential dumping (correlate with T1003).
    Check if found credentials were subsequently used for lateral movement (T1021).
    PuTTY session registry keys may contain saved SSH credentials in plaintext.
    cmdkey /list reveals stored Windows credentials including RDP saved passwords.
