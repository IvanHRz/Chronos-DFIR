title: Process Masquerading – Suspicious System Binary Impersonation
id: f6a7b8c9-d0e1-2345-fabc-456789012345
status: stable
description: |
  Detects attackers masquerading malicious processes as legitimate Windows system
  binaries by placing them in unexpected directories or using look-alike names.
  Common techniques: svchost.exe from non-System32, lsass.exe copy, adding spaces
  to binary names (e.g. "svchost .exe"), unicode homoglyphs, or double extension files.
references:
  - https://attack.mitre.org/techniques/T1036/
  - https://github.com/WithSecureLabs/chainsaw
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/07
tags:
  - attack.defense_evasion
  - attack.t1036
  - chainsaw
logsource:
  category: process_creation
  product: windows
detection:
  svchost_wrong_path:
    Image|contains: 'svchost'
    Image|not|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  critical_proc_wrong_path:
    Image|endswith|any:
      - '\lsass.exe'
      - '\csrss.exe'
      - '\winlogon.exe'
      - '\wininit.exe'
      - '\smss.exe'
      - '\services.exe'
      - '\spoolsv.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  double_extension:
    Image|endswith|any:
      - '.exe.exe'
      - '.pdf.exe'
      - '.doc.exe'
      - '.jpg.exe'
      - '.xls.exe'
      - '.txt.exe'
  hidden_path_chars:
    Image|contains|any:
      - ' .exe'
      - '.exe '
  condition: svchost_wrong_path or critical_proc_wrong_path or double_extension or hidden_path_chars
falsepositives:
  - Legitimate portable applications running from non-standard paths
  - Software development and testing tools
  - Security research sandboxes
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
  - ParentProcessId
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1036 – Masquerading"
  windows_event_ids: ["1", "4688"]
  chainsaw_compatible: true
