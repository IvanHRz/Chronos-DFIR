title: Masquerading – System Binary Executed from Wrong Path
id: b8c9d0e1-3838-4b2c-c3d4-e5f6a7b8c9d0
status: stable
description: |
  Detects Windows system binaries (svchost, lsass, csrss, services, smss, etc.)
  running from paths other than their legitimate System32/SysWOW64 locations.
  Attackers frequently name their malware after legitimate system processes but
  execute them from user-writable directories. This is one of the highest-fidelity
  detection rules for process masquerading.
references:
  - https://attack.mitre.org/techniques/T1036/005/
  - https://www.sans.org/blog/finding-evil-processes/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.defense_evasion
  - attack.t1036.005
  - chainsaw
logsource:
  category: process_creation
  product: windows
detection:
  svchost_wrong_path:
    Image|endswith: '\svchost.exe'
    Image|not|contains:
      - '\Windows\System32\'
      - '\Windows\SysWOW64\'
  lsass_wrong_path:
    Image|endswith: '\lsass.exe'
    Image|not|contains: '\Windows\System32\'
  csrss_wrong_path:
    Image|endswith: '\csrss.exe'
    Image|not|contains: '\Windows\System32\'
  services_wrong_path:
    Image|endswith: '\services.exe'
    Image|not|contains: '\Windows\System32\'
  smss_wrong_path:
    Image|endswith: '\smss.exe'
    Image|not|contains: '\Windows\System32\'
  explorer_wrong_path:
    Image|endswith: '\explorer.exe'
    Image|not|contains: '\Windows\'
  taskhostw_wrong_path:
    Image|endswith: '\taskhostw.exe'
    Image|not|contains: '\Windows\System32\'
  condition: svchost_wrong_path or lsass_wrong_path or csrss_wrong_path or services_wrong_path or smss_wrong_path or explorer_wrong_path or taskhostw_wrong_path
falsepositives:
  - Extremely rare — legitimate Windows never runs these from alternate paths
  - Windows SxS/WinSxS components (verify full path includes winsxs)
level: critical
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - Computer
  - Hashes
  - IntegrityLevel
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1036.005 – Masquerading: Match Legitimate Name or Location"
  chainsaw_compatible: true
  investigation_note: |
    This is one of the highest confidence detections available. svchost.exe should
    ONLY run from C:\Windows\System32\ and always have services.exe as parent.
    lsass.exe should have exactly ONE instance from System32 with wininit.exe as
    parent. Any deviation is almost certainly malicious. Check the file hash against
    the legitimate Windows binary hash. Use YARA or PE analysis on the suspicious file.
