title: Timestomping Detection – File Time Attribute Manipulation
id: f6a7b8c9-3636-4f0a-a1b2-c3d4e5f6a7b8
status: stable
description: |
  Detects timestomping attempts where attackers modify file creation, modification,
  or access timestamps to blend malicious files with legitimate system files. Detected
  via Sysmon Event 2 (FileCreateTime changed), PowerShell timestamp manipulation,
  and tools known for timestomping. Also detects MFT anomalies where $STANDARD_INFO
  and $FILE_NAME timestamps diverge.
references:
  - https://attack.mitre.org/techniques/T1070/006/
  - https://www.sans.org/blog/detecting-timestomping-with-sysmon/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.defense_evasion
  - attack.t1070.006
  - chainsaw
logsource:
  category: file_change
  product: windows
detection:
  sysmon_time_change:
    EventID: '2'
  powershell_timestamp:
    CommandLine|contains|any:
      - 'CreationTime'
      - 'LastWriteTime'
      - 'LastAccessTime'
      - 'SetCreationTime'
      - 'SetLastWriteTime'
      - 'SetLastAccessTime'
      - '[System.IO.File]::SetCreationTime'
      - 'touch'
  timestomp_tools:
    CommandLine|contains|any:
      - 'timestomp'
      - 'NtSetInformationFile'
      - 'SetFileTime'
      - 'TimeStomp'
      - 'New-Object System.IO.FileInfo'
  mft_anomaly:
    TargetFilename|contains|any:
      - '\Windows\System32\'
      - '\Windows\SysWOW64\'
    CreationTime|contains|any:
      - '2019'
      - '2020'
      - '2021'
  condition: sysmon_time_change or powershell_timestamp or timestomp_tools
falsepositives:
  - Build systems that set file timestamps during compilation
  - Backup and restore operations that preserve original timestamps
  - Software installers that set creation times
level: high
fields:
  - EventID
  - TargetFilename
  - CreationUtcTime
  - PreviousCreationUtcTime
  - Image
  - CommandLine
  - User
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1070.006 – Indicator Removal: Timestomping"
  windows_event_ids: ["2"]
  chainsaw_compatible: true
  investigation_note: |
    Sysmon Event 2 captures the original and new timestamp — large jumps backward
    in time are strong indicators of timestomping. In MFT analysis, compare
    $STANDARD_INFO timestamps (easily modified) with $FILE_NAME timestamps (harder
    to modify) — divergence indicates timestomping. Files in System32 with creation
    dates far newer than the OS install date (visible via $FILE_NAME) are suspicious.
