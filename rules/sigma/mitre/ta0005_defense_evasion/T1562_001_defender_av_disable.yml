title: Windows Defender / AV Service Disabled or Tampered
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
description: |
  Detects attempts to disable Windows Defender or other AV/EDR products.
  Attackers disable security tools to avoid detection before or after intrusion.
  Covers registry modifications, PowerShell cmdlets, sc.exe service stops,
  and scheduled task tampering used to disable AV realtime protection.
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/WithSecureLabs/chainsaw
  - https://github.com/sbousseaden/EVTX-ATTACK-SAMPLES
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/07
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - chainsaw
logsource:
  category: process_creation
  product: windows
detection:
  defender_registry_disable:
    EventID: '13'  # Sysmon RegistrySetValue
    TargetObject|contains|any:
      - '\Windows Defender\DisableAntiSpyware'
      - '\Windows Defender\DisableRealtimeMonitoring'
      - '\Windows Defender\DisableBehaviorMonitoring'
      - '\Windows Defender\DisableIOAVProtection'
      - '\Windows Defender\DisableOnAccessProtection'
  powershell_disable_defender:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'Set-MpPreference -DisableIOAVProtection'
      - 'Add-MpPreference -ExclusionPath'
      - 'Set-MpPreference -DisableBehaviorMonitoring'
  sc_stop_av:
    Image|endswith: '\sc.exe'
    CommandLine|contains|any:
      - 'stop WinDefend'
      - 'stop MsMpSvc'
      - 'delete WinDefend'
      - 'stop Sense'
  net_stop_av:
    Image|endswith: '\net.exe'
    CommandLine|contains|any:
      - 'stop "Windows Defender"'
      - 'stop WinDefend'
  tamper_protection_off:
    EventID: '5007'
    NewValue|contains: 'DisableTamperProtection'
  windows_defender_state:
    EventID:
      - '5001'   # Realtime protection disabled
      - '5010'   # Antispyware disabled
      - '5012'   # Antivirus disabled
  condition: defender_registry_disable or powershell_disable_defender or sc_stop_av or net_stop_av or tamper_protection_off or windows_defender_state
falsepositives:
  - Endpoint security software managing exclusions during upgrades
  - Authorized IT configuration scripts
  - Security testing environments
level: high
fields:
  - CommandLine
  - Image
  - TargetObject
  - NewValue
  - User
  - EventID
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1562.001 – Impair Defenses: Disable or Modify Tools"
  windows_event_ids: ["5001", "5007", "5010", "5012", "13"]
  chainsaw_compatible: true
