title: BITS Jobs Abuse for Persistence and Download
id: a1b2c3d4-e5f6-7890-abcd-ef0123456789
status: stable
description: |
  Detects abuse of Windows Background Intelligent Transfer Service (BITS) for
  persistence and file download. Attackers use bitsadmin.exe or PowerShell
  BITS cmdlets to download payloads and establish persistence via BITS jobs
  that survive reboots. BITS transfers blend with legitimate Windows Update
  traffic, making detection difficult without log analysis.
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://docs.microsoft.com/en-us/windows/win32/bits/bitsadmin-tool
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.defense_evasion
  - attack.persistence
  - attack.t1197
  - living_off_the_land
logsource:
  category: process_creation
  product: windows
detection:
  bitsadmin_transfer:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains|any:
      - '/transfer'
      - '/create'
      - '/addfile'
      - '/setnotifycmdline'
      - '/resume'
      - '/complete'
  bitsadmin_download:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains|any:
      - 'http://'
      - 'https://'
      - 'ftp://'
  powershell_bits:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'Start-BitsTransfer'
      - 'Import-Module BitsTransfer'
      - 'New-Object System.Net.WebClient'
  bits_event_created:
    EventID: '59'
    Channel: 'Microsoft-Windows-Bits-Client/Operational'
  bits_event_completed:
    EventID: '60'
    Channel: 'Microsoft-Windows-Bits-Client/Operational'
  condition: bitsadmin_transfer or bitsadmin_download or powershell_bits or bits_event_created or bits_event_completed
falsepositives:
  - Windows Update and WSUS using BITS for legitimate patch downloads
  - SCCM/Intune software deployment via BITS
  - Enterprise software using BITS API for large file transfers
level: medium
fields:
  - Image
  - CommandLine
  - EventID
  - User
  - Computer
  - ParentImage
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1197 – BITS Jobs"
  windows_event_ids: ["59", "60"]
  chainsaw_compatible: true
  investigation_note: |
    Run 'bitsadmin /list /allusers /verbose' to enumerate active BITS jobs.
    Check for jobs with SetNotifyCmdLine (persistence mechanism) or jobs
    downloading from external URLs. Correlate with Prefetch for bitsadmin.exe.
