title: Command and Control over Web Protocols – HTTP/S C2 Beaconing
id: d0e1f2a3-b4c5-6789-defa-890123456789
status: stable
description: |
  Detects Command and Control (C2) communication over HTTP/S using standard and
  non-standard ports. Covers beaconing via LOLBins (mshta, regsvr32, rundll32, certutil),
  PowerShell web cradles, and suspicious process-to-network connections from processes
  that do not normally initiate outbound connections. Includes detection of common
  C2 frameworks (Cobalt Strike, Metasploit, Havoc, Sliver) via characteristic patterns.
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://github.com/WithSecureLabs/chainsaw
  - https://github.com/rapid7/metasploit-framework
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/07
tags:
  - attack.command_and_control
  - attack.t1071.001
  - chainsaw
logsource:
  category: process_creation
  product: windows
detection:
  powershell_web_cradle:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'DownloadFile'
      - 'WebClient'
      - 'Net.Http.HttpClient'
      - 'Start-BitsTransfer'
  lolbin_network:
    Image|endswith|any:
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\certutil.exe'
    CommandLine|contains|any:
      - 'http://'
      - 'https://'
      - 'ftp://'
  certutil_decode_download:
    Image|endswith: '\certutil.exe'
    CommandLine|contains|any:
      - '-urlcache'
      - '-decode'
      - '-encode'
      - '-decodehex'
  cobalt_strike_indicators:
    CommandLine|contains|any:
      - 'beacon'
      - '/admin/get.php'
      - '/ca'
      - 'Content-Type: application/octet-stream'
      - 'jQuery'
  meterpreter_indicators:
    CommandLine|contains|any:
      - 'reverse_https'
      - 'reverse_tcp'
      - 'stage.php'
  scheduled_web_call:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|any:
      - 'http://'
      - 'https://'
      - 'wget'
      - 'curl'
  wmi_network_activity:
    Image|endswith: '\wmiprvse.exe'
    CommandLine|contains|any:
      - 'http'
      - 'powershell'
      - 'cmd'
  condition: powershell_web_cradle or lolbin_network or certutil_decode_download or cobalt_strike_indicators or meterpreter_indicators or scheduled_web_call or wmi_network_activity
falsepositives:
  - Software update mechanisms using HTTP/S for patch downloads
  - Legitimate PowerShell administration scripts with web calls
  - System management tools (Ansible, Chef, Puppet) communicating over HTTP
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - Computer
  - Destination_Entity
custom:
  mitre_tactic: "TA0011 – Command and Control"
  mitre_technique: "T1071.001 – Application Layer Protocol: Web Protocols"
  windows_event_ids: ["4688", "1", "3", "22"]
  chainsaw_compatible: true
  investigation_note: |
    Correlate with Sysmon Event 3 (NetworkConnect) to identify C2 beacon destination IPs.
    Look for regular, repeating intervals in connection timestamps (beaconing cadence).
    Check Sysmon Event 22 (DNS Query) for domain generation algorithm (DGA) patterns.
