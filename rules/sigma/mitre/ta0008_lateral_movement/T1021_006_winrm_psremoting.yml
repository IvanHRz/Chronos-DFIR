title: WinRM and PowerShell Remoting Lateral Movement
id: c3d4e5f6-a7b8-9012-cdef-012345678901
status: stable
description: |
  Detects use of Windows Remote Management (WinRM) and PowerShell Remoting
  for lateral movement. Attackers leverage WinRM (TCP 5985/5986) to execute
  commands on remote systems using Enter-PSSession, Invoke-Command, or
  winrs.exe. WinRM is a legitimate admin tool but is heavily abused in
  post-exploitation for fileless lateral movement.
references:
  - https://attack.mitre.org/techniques/T1021/006/
  - https://docs.microsoft.com/en-us/windows/win32/winrm/portal
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.lateral_movement
  - attack.t1021.006
  - living_off_the_land
logsource:
  category: process_creation
  product: windows
detection:
  ps_remoting:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'Enter-PSSession'
      - 'New-PSSession'
      - 'Invoke-Command'
      - '-ComputerName'
      - 'Enable-PSRemoting'
      - 'Set-WSManQuickConfig'
  winrs_execution:
    Image|endswith: '\winrs.exe'
    CommandLine|contains|any:
      - '-r:'
      - '/r:'
      - '-remote:'
  winrm_service:
    Image|endswith: '\winrm.cmd'
    CommandLine|contains|any:
      - 'quickconfig'
      - 'set winrm'
  winrm_event_connection:
    EventID|any:
      - '6'
      - '91'
    Channel: 'Microsoft-Windows-WinRM/Operational'
  wsmprovhost_spawn:
    ParentImage|endswith: '\wsmprovhost.exe'
  condition: ps_remoting or winrs_execution or winrm_service or winrm_event_connection or wsmprovhost_spawn
falsepositives:
  - System administrators using PowerShell Remoting for legitimate management
  - Configuration management tools (Ansible, DSC) using WinRM
  - Monitoring solutions using WinRM for data collection
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - Computer
  - EventID
custom:
  mitre_tactic: "TA0008 – Lateral Movement"
  mitre_technique: "T1021.006 – Remote Services: Windows Remote Management"
  windows_event_ids: ["6", "91"]
  chainsaw_compatible: true
  investigation_note: |
    Check wsmprovhost.exe child processes — any process spawned by wsmprovhost
    was executed via PS Remoting. Correlate with Event 4624 Type 3 logons from
    the source IP. Review WinRM Operational log for session details.
