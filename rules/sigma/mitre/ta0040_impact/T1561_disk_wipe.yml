title: Disk Wipe and MBR/VBR Destruction
id: d0e1f2a3-b4c5-6789-defa-789012345678
status: stable
description: |
  Detects disk wipe operations targeting the Master Boot Record (MBR), Volume
  Boot Record (VBR), or raw disk sectors. This is the most destructive impact
  technique — rendering systems unbootable by overwriting boot structures.
  Associated with nation-state wipers (NotPetya, WhisperGate, HermeticWiper)
  and destructive ransomware. Detection covers raw disk access, boot record
  modification, and known wiper tool patterns.
references:
  - https://attack.mitre.org/techniques/T1561/
  - https://attack.mitre.org/techniques/T1561/001/
  - https://attack.mitre.org/techniques/T1561/002/
  - https://www.cisa.gov/uscert/ncas/alerts/aa22-057a
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.impact
  - attack.t1561
  - attack.t1561.001
  - attack.t1561.002
  - critical
  - destructive
  - wiper
logsource:
  category: process_creation
  product: windows
detection:
  raw_disk_access:
    CommandLine|contains|any:
      - '\\.\PhysicalDrive0'
      - '\\.\PhysicalDrive1'
      - '\\.\PHYSICALDRIVE0'
      - '\\.\C:'
      - 'CreateFile.*PhysicalDrive'
  bootrec_destruction:
    Image|endswith|any:
      - '\bootrec.exe'
      - '\bootsect.exe'
    CommandLine|contains|any:
      - '/fixmbr'
      - '/fixboot'
      - '/rebuildbcd'
      - '/nt60'
  diskpart_wipe:
    Image|endswith: '\diskpart.exe'
    CommandLine|contains|any:
      - 'clean all'
      - 'clean'
      - 'delete partition override'
      - 'delete volume override'
  dd_wipe:
    CommandLine|contains|any:
      - 'dd if=/dev/zero of=/dev/sd'
      - 'dd if=/dev/null of=/dev/sd'
      - 'dd if=/dev/urandom of=/dev/sd'
      - 'shred -vfz'
      - 'nwipe'
  powershell_disk_wipe:
    Image|endswith|any:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|any:
      - 'Clear-Disk'
      - 'Initialize-Disk'
      - 'Remove-Partition -Confirm:$false'
      - 'Set-Disk -IsOffline $true'
  wiper_recovery_disable:
    CommandLine|contains|any:
      - 'bcdedit /set {default} recoveryenabled No'
      - 'bcdedit /set {default} safeboot'
      - 'reagentc /disable'
  condition: raw_disk_access or bootrec_destruction or diskpart_wipe or dd_wipe or powershell_disk_wipe or wiper_recovery_disable
falsepositives:
  - System provisioning and OS deployment (MDT, SCCM)
  - Authorized disk formatting during hardware refresh
  - IT performing legitimate disk maintenance
level: critical
fields:
  - Image
  - CommandLine
  - User
  - Computer
  - ParentImage
custom:
  mitre_tactic: "TA0040 – Impact"
  mitre_technique: "T1561 – Disk Wipe"
  chainsaw_compatible: true
  investigation_note: |
    Disk wipe activity is almost always malicious in production environments.
    Immediately isolate the affected system. Check for lateral movement from
    the source host. Wiper malware often spreads via PsExec, WMI, or Group
    Policy before executing the destructive payload simultaneously across
    multiple systems.
