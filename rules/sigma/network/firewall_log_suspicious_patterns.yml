title: Firewall Log Suspicious Patterns – Reconnaissance and Lateral Movement
id: c3d4e5f6-3333-4c7d-d8e9-f0a1b2c3d4e5
status: stable
description: |
  Detects suspicious patterns in firewall logs indicating port scanning, lateral
  movement attempts, C2 communication on non-standard ports, and data exfiltration.
  Covers both Windows Firewall (Event 5156/5157) and network firewall log formats.
references:
  - https://attack.mitre.org/techniques/T1046/
  - https://attack.mitre.org/techniques/T1571/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.discovery
  - attack.t1046
  - attack.command_and_control
  - attack.t1571
logsource:
  category: firewall
  product: network
detection:
  common_c2_ports:
    DestinationPort|any:
      - '4444'
      - '5555'
      - '8443'
      - '8080'
      - '9090'
      - '1337'
      - '6666'
      - '6667'
      - '6697'
      - '31337'
      - '12345'
      - '54321'
  smb_lateral:
    DestinationPort|any:
      - '445'
      - '139'
      - '135'
    Action: 'allow'
  rdp_non_standard:
    DestinationPort: '3389'
    SourceIP|contains|any:
      - '10.'
      - '192.168.'
      - '172.'
  dns_over_non_standard:
    DestinationPort: '53'
    Protocol: 'TCP'
  outbound_suspicious:
    Direction: 'outbound'
    DestinationPort|any:
      - '20'
      - '21'
      - '22'
      - '23'
      - '25'
      - '110'
      - '143'
      - '1080'
      - '3128'
      - '8888'
  condition: common_c2_ports or smb_lateral or dns_over_non_standard or outbound_suspicious
falsepositives:
  - Legitimate services running on non-standard ports
  - Internal SMB file sharing between authorized systems
  - DNS zone transfers using TCP port 53
level: medium
fields:
  - SourceIP
  - DestinationIP
  - SourcePort
  - DestinationPort
  - Protocol
  - Action
  - Direction
  - Application
  - Timestamp
custom:
  mitre_tactic: "TA0007 – Discovery"
  mitre_technique: "T1046 – Network Service Discovery"
  chainsaw_compatible: false
  investigation_note: |
    Port scanning produces many denied connections in rapid succession from one
    source to many destinations on the same port. C2 frameworks commonly use
    ports 4444, 8443, 8080. SMB connections (445) between workstations (not to
    file servers) indicate lateral movement. DNS over TCP (not UDP) may indicate
    DNS tunneling. Correlate firewall logs with proxy and DNS logs for attribution.
