title: Proxy Log Suspicious Indicators – C2 and Exfiltration Patterns
id: b2c3d4e5-3232-4b6c-c7d8-e9f0a1b2c3d4
status: stable
description: |
  Detects suspicious patterns in web proxy logs that indicate command and control
  communication, data exfiltration, or malware delivery. Covers beaconing patterns
  (regular interval connections), unusual user agents, direct IP connections
  bypassing DNS, and suspicious content types.
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1090/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1090
logsource:
  category: proxy
  product: network
detection:
  suspicious_user_agent:
    UserAgent|contains|any:
      - 'python-requests'
      - 'Go-http-client'
      - 'Java/'
      - 'Apache-HttpClient'
      - 'curl/'
      - 'wget/'
      - 'PowerShell/'
      - 'CobaltStrike'
      - 'Havoc'
      - 'NESSUS'
      - 'Nikto'
      - 'sqlmap'
      - 'DirBuster'
      - 'Gobuster'
  direct_ip_connection:
    URL|contains|any:
      - 'http://10.'
      - 'http://192.168.'
      - 'http://172.16.'
      - 'https://10.'
      - 'https://192.168.'
      - 'https://172.16.'
  suspicious_content_type:
    ContentType|contains|any:
      - 'application/octet-stream'
      - 'application/x-executable'
      - 'application/x-msdos-program'
      - 'application/x-msdownload'
      - 'application/hta'
      - 'application/x-shellscript'
  high_volume_upload:
    BytesSent|gte: 52428800
    Method: 'POST'
  encoded_url_params:
    URL|contains|any:
      - 'base64'
      - 'cmd='
      - 'exec='
      - 'command='
      - 'shell='
      - 'payload='
      - 'token='
  condition: suspicious_user_agent or direct_ip_connection or suspicious_content_type or high_volume_upload or encoded_url_params
falsepositives:
  - Legitimate API clients using programmatic user agents
  - Internal services communicating via IP addresses
  - Large file uploads to authorized cloud services
level: medium
fields:
  - URL
  - UserAgent
  - Method
  - StatusCode
  - BytesSent
  - BytesReceived
  - ContentType
  - SourceIP
  - Timestamp
custom:
  mitre_tactic: "TA0011 – Command and Control"
  mitre_technique: "T1071.001 – Application Layer Protocol: Web Protocols"
  chainsaw_compatible: false
  investigation_note: |
    Beaconing detection requires time-series analysis — look for connections at
    regular intervals (e.g., every 60s with jitter). User agents like
    "python-requests" or "Go-http-client" from workstations (not servers)
    are suspicious. Large POST requests to uncommon domains suggest exfiltration.
    Direct IP connections bypass DNS logging — correlate with firewall logs.
