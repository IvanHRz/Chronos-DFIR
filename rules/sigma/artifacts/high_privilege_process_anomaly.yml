title: High Privilege Process Running from User Directory
id: c3d4e5f6-9003-4b8c-d9e0-f1a2b3c4d567
status: stable
description: |
  Detects SYSTEM or root-level processes executing from user-writable directories such as
  user profiles, temp folders, or downloads. Legitimate SYSTEM processes should run from
  protected system directories (System32, SysWOW64, Program Files). A SYSTEM process
  running from a user directory is a strong indicator of privilege escalation, service
  exploitation, or token impersonation. This pattern is common in post-exploitation
  frameworks and fileless malware that achieves SYSTEM via named pipe impersonation
  or service abuse.
references:
  - https://attack.mitre.org/techniques/T1134/
  - https://attack.mitre.org/techniques/T1068/
  - https://www.elastic.co/guide/en/security/current/system-shells-via-services.html
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.privilege_escalation
  - attack.t1134
  - attack.t1068
  - artifact.process_list
logsource:
  category: process_creation
  product: windows
detection:
  high_privilege_user:
    User|contains|any:
      - 'SYSTEM'
      - 'NT AUTHORITY\SYSTEM'
      - 'NT AUTHORITY\\SYSTEM'
      - 'LocalSystem'
      - 'root'
      - 'NETWORK SERVICE'
  user_directory_path:
    Image|contains|any:
      - '\Users\'
      - '\Documents and Settings\'
      - '\AppData\'
      - '\Desktop\'
      - '\Downloads\'
      - '\Temp\'
      - '\tmp\'
      - '\Public\'
      - '/home/'
      - '/tmp/'
      - '/var/tmp/'
      - '/dev/shm/'
  condition: high_privilege_user and user_directory_path
falsepositives:
  - Windows Update or SCCM agents temporarily executing from user-accessible paths
  - Legitimate service installers that briefly run as SYSTEM from temp directories
  - Software deployment tools (SCCM, PDQ Deploy) using user-writable staging paths
level: medium
fields:
  - User
  - PID
  - Image
  - SessionName
custom:
  mitre_tactic: "TA0004 – Privilege Escalation"
  mitre_technique: "T1134 – Access Token Manipulation"
  investigation_note: |
    Verify the process binary hash and digital signature. Check the Windows Event Log for
    service creation events (Event ID 7045) or scheduled task creation (Event ID 4698)
    that may have launched this process. Investigate whether a privilege escalation exploit
    was used by examining the process creation chain. SYSTEM processes from user directories
    are rarely legitimate and should be treated as compromise indicators.
