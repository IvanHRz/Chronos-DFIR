title: Suspicious LNK Shortcut Files – Weaponized or Anomalous Links
id: f6a7b8c9-6006-4fa0-a1b2-c3d4e5f6a7b8
status: stable
description: |
  Detects suspicious Windows shortcut (.lnk) files that may indicate weaponized
  delivery mechanisms or post-exploitation file access patterns. Attackers craft
  LNK files that execute PowerShell, cmd, mshta, or other interpreters. Forensic
  LNK analysis also reveals recently accessed files, network shares, and USB volumes
  that an attacker interacted with. Parsed by LECmd, JLECmd, or native Chronos.
references:
  - https://attack.mitre.org/techniques/T1204/001/
  - https://attack.mitre.org/techniques/T1547/009/
  - https://www.mandiant.com/resources/blog/tracking-malware-with-lnk-files
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.execution
  - attack.t1204.001
  - attack.persistence
  - attack.t1547.009
  - artifact.lnk
logsource:
  category: lnk_file
  product: windows
detection:
  weaponized_target:
    TargetPath|contains|any:
      - 'powershell'
      - 'cmd.exe'
      - 'mshta'
      - 'wscript'
      - 'cscript'
      - 'rundll32'
      - 'regsvr32'
      - 'certutil'
      - 'bitsadmin'
  suspicious_arguments:
    Arguments|contains|any:
      - '-enc'
      - '-encodedcommand'
      - 'downloadstring'
      - 'invoke-expression'
      - 'iex'
      - 'bypass'
      - '-nop'
      - 'hidden'
      - 'http://'
      - 'https://'
      - 'ftp://'
  network_share_access:
    TargetPath|contains|any:
      - '\\\\'
      - '\\192.'
      - '\\10.'
      - '\\172.'
  removable_media:
    DriveType: '2'
    VolumeSerialNumber|not: ''
  condition: (weaponized_target and suspicious_arguments) or network_share_access or removable_media
falsepositives:
  - Legitimate shortcuts to command-line tools created by administrators
  - Mapped network drive shortcuts in corporate environments
  - USB device shortcuts created during normal file operations
level: high
fields:
  - SourceFile
  - TargetPath
  - Arguments
  - WorkingDirectory
  - DriveType
  - VolumeSerialNumber
  - MachineName
  - CreationTime
  - AccessTime
  - ModificationTime
custom:
  mitre_tactic: "TA0002 – Execution"
  mitre_technique: "T1204.001 – User Execution: Malicious Link"
  chainsaw_compatible: false
  investigation_note: |
    LNK files contain embedded timestamps (creation, access, modification) of the
    TARGET file — not the shortcut itself. The MachineName field reveals the NetBIOS
    name of the machine where the target was created (lateral movement indicator).
    VolumeSerialNumber identifies specific USB devices. Check Recent folder LNK files
    to reconstruct the attacker's file browsing activity chronologically.
