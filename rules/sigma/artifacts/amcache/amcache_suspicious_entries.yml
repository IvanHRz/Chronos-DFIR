title: AmCache Suspicious Program Execution – Unsigned or Temp Path Binaries
id: c3d4e5f6-3003-4c7d-d8e9-f0a1b2c3d4e5
status: stable
description: |
  Detects suspicious entries in the Windows AmCache.hve registry hive indicating
  execution of unsigned binaries, programs from temporary directories, or known
  offensive tooling. AmCache records SHA1 hashes, file paths, publisher info, and
  timestamps for executed programs — critical for attribution and IOC correlation.
  Parsed by tools like AmcacheParser, RegRipper, or native Chronos ingestion.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://www.ssi.gouv.fr/uploads/2019/01/anssi-coriin-2019-analysis_amcache.pdf
  - https://github.com/EricZimmerman/AmcacheParser
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.execution
  - attack.t1059
  - attack.defense_evasion
  - artifact.amcache
logsource:
  category: amcache
  product: windows
detection:
  unsigned_binary:
    Publisher: ''
    Path|endswith|any:
      - '.exe'
      - '.dll'
      - '.scr'
  suspicious_path:
    Path|contains|any:
      - '\Temp\'
      - '\AppData\Local\Temp\'
      - '\Users\Public\'
      - '$Recycle.Bin'
      - '\ProgramData\'
      - '\Windows\Temp\'
      - '\perflogs\'
  single_char_binary:
    FileName|contains|any:
      - 'a.exe'
      - 'b.exe'
      - 'x.exe'
      - '1.exe'
      - 'svc.exe'
      - 'update.exe'
      - 'helper.exe'
      - 'service.exe'
      - 'svhost.exe'
      - 'scvhost.exe'
  condition: (unsigned_binary and suspicious_path) or single_char_binary
falsepositives:
  - Newly installed legitimate software before publisher metadata is populated
  - Self-compiled internal tools without code-signing certificates
  - Software updaters that run from temporary directories
level: medium
fields:
  - Path
  - FileName
  - Publisher
  - SHA1
  - FileSize
  - CompileTime
  - LastModified
custom:
  mitre_tactic: "TA0002 – Execution"
  mitre_technique: "T1059 – Command and Scripting Interpreter"
  chainsaw_compatible: false
  investigation_note: |
    AmCache SHA1 hashes can be immediately searched against VirusTotal or threat
    intelligence feeds. Compare CompileTime with LastModified — large discrepancies
    suggest timestomping. Cross-reference with Prefetch RunCount for execution
    frequency and ShimCache for filesystem presence confirmation.
