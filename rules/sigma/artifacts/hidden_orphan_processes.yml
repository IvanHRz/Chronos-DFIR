title: Hidden or Orphan Processes – Suspicious Parent PID and Path
id: b2c3d4e5-9002-4a7b-c8d9-e0f1a2b3c456
status: stable
description: |
  Detects processes with anomalous parent process IDs or running from suspicious filesystem
  locations in process listing artifacts (tasklist, pslist, vol.py pslist). On Windows,
  processes with PPID 0 or 1 are abnormal (only System should have PPID 0). Processes
  executing from Temp directories, Recycle Bin, or user-writable paths outside Program Files
  indicate potential malware execution. Orphan processes (where the parent has exited) can
  indicate process injection or masquerading techniques.
references:
  - https://attack.mitre.org/techniques/T1036/
  - https://attack.mitre.org/techniques/T1055/
  - https://www.sans.org/blog/finding-evil-in-process-creation-events/
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/09
tags:
  - attack.defense_evasion
  - attack.t1036
  - attack.t1055
  - artifact.process_list
logsource:
  category: process_creation
  product: windows
detection:
  orphan_ppid:
    PPID|equals|any:
      - '0'
      - '1'
  suspicious_path:
    Path|contains|any:
      - '\Temp\'
      - '\tmp\'
      - '\AppData\Local\Temp'
      - '\AppData\Roaming\'
      - '$Recycle.Bin'
      - '\Downloads\'
      - '\Desktop\'
      - '\Public\'
      - '\ProgramData\'
      - '\Windows\Debug\'
      - '\perflogs\'
      - '/tmp/'
      - '/var/tmp/'
      - '/dev/shm/'
  suspicious_name:
    Name|contains|any:
      - 'svchost'
      - 'csrss'
      - 'lsass'
      - 'services'
      - 'smss'
      - 'wininit'
      - 'winlogon'
  condition: orphan_ppid or suspicious_path or (suspicious_name and suspicious_path)
falsepositives:
  - System Idle Process (PID 0) is normal on Windows
  - Some legitimate installers spawn processes from Temp directories
  - Software updaters running from AppData (Chrome, Discord, etc.)
level: high
fields:
  - Name
  - PID
  - PPID
  - Path
custom:
  mitre_tactic: "TA0005 – Defense Evasion"
  mitre_technique: "T1036 – Masquerading"
  investigation_note: |
    For orphan processes, verify whether the parent process legitimately exited or was
    terminated to hide the execution chain. For critical Windows processes (svchost, csrss,
    lsass), verify the expected parent: svchost→services.exe, csrss→smss.exe,
    lsass→wininit.exe. Any deviation indicates process masquerading. Check file hashes
    against known-good baselines and verify digital signatures.
