title: SRUM – Suspicious Application Resource Usage Patterns
id: e5f6a7b8-5005-4e9f-f0a1-b2c3d4e5f6a7
status: stable
description: |
  Detects suspicious patterns in the System Resource Usage Monitor (SRUM) database,
  which tracks application execution, network usage, energy consumption, and push
  notifications over 30-60 days. SRUM survives anti-forensic techniques that target
  Prefetch and event logs. High network bytes from unknown executables, execution
  of tools from temp paths, or unusual data transfer volumes are flagged.
references:
  - https://attack.mitre.org/techniques/T1071/
  - https://www.sans.org/blog/digital-forensics-srum-database/
  - https://github.com/MarkBaggett/srum-dump
author: Chronos-DFIR / Ivan Huerta
date: 2026/03/08
tags:
  - attack.execution
  - attack.exfiltration
  - attack.t1071
  - artifact.srum
logsource:
  category: srum
  product: windows
detection:
  high_network_unknown_app:
    ExePath|contains|any:
      - '\Temp\'
      - '\AppData\'
      - '\ProgramData\'
      - '\Users\Public\'
      - '\Downloads\'
    BytesSent|gte: 104857600
  suspicious_app_network:
    ExePath|contains|any:
      - 'powershell'
      - 'cmd.exe'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'certutil'
      - 'bitsadmin'
      - 'rundll32'
    BytesSent|gte: 1048576
  crypto_miner_indicators:
    ExePath|contains|any:
      - 'xmrig'
      - 'minergate'
      - 'nicehash'
      - 'cpuminer'
      - 'cgminer'
      - 'bfgminer'
    CpuCyclesInForeground|gte: 1000000
  condition: high_network_unknown_app or suspicious_app_network or crypto_miner_indicators
falsepositives:
  - Legitimate large file transfers by authorized software
  - Cloud sync applications (OneDrive, Dropbox) with high data volumes
  - Software update services
level: medium
fields:
  - ExePath
  - BytesSent
  - BytesReceived
  - TimeStamp
  - UserId
  - AppId
  - CpuCyclesInForeground
custom:
  mitre_tactic: "TA0010 – Exfiltration"
  mitre_technique: "T1071 – Application Layer Protocol"
  chainsaw_compatible: false
  investigation_note: |
    SRUM data is stored in %SystemRoot%\System32\sru\SRUDB.dat (ESE database).
    It retains data even after the executable is deleted. Cross-reference ExePath
    with AmCache/Prefetch to build a complete execution timeline. Network byte
    counts can reveal data staging or exfiltration that no other artifact captures.
